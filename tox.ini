[tox]
min_version = 4.0
requires = tox-uv
env_list =
    py310
    ruff
    ruff-format
skipsdist = true

[testenv]
package = skip
deps =
    -r test-requirements.txt
commands = pytest {posargs:instrumentation}

[testenv:venv]
package = skip
deps =
    -r test-requirements.txt
commands =
    uv pip install \
    -e {toxinidir}/instrumentation/opentelemetry-instrumentation-taskflow[instruments] \
    -e {toxinidir}/instrumentation/opentelemetry-instrumentation-oslo-log[instruments] \
    -e {toxinidir}/instrumentation/opentelemetry-instrumentation-oslo-messaging[instruments]

[testenv:all]
package = skip
deps =
    -r test-requirements.txt
    -e ./instrumentation/opentelemetry-instrumentation-taskflow[instruments]
    -e ./instrumentation/opentelemetry-instrumentation-oslo-log[instruments]
    -e ./instrumentation/opentelemetry-instrumentation-oslo-messaging[instruments]
# importlib mode avoids the duplicate "tests" package name across the three
# instrumentation packages being collected together.
commands = pytest --import-mode=importlib {posargs:{toxinidir}/instrumentation}

[testenv:taskflow]
package = skip
deps =
    -r test-requirements.txt
    -e ./instrumentation/opentelemetry-instrumentation-taskflow[instruments]
commands = pytest {toxinidir}/instrumentation/opentelemetry-instrumentation-taskflow/tests {posargs}

[testenv:oslo.log]
package = skip
deps =
    -r test-requirements.txt
    -e ./instrumentation/opentelemetry-instrumentation-oslo-log[instruments]
commands = pytest {toxinidir}/instrumentation/opentelemetry-instrumentation-oslo-log/tests {posargs}

[testenv:oslo.messaging]
package = skip
deps =
    -r test-requirements.txt
    -e ./instrumentation/opentelemetry-instrumentation-oslo-messaging[instruments]
commands = pytest {toxinidir}/instrumentation/opentelemetry-instrumentation-oslo-messaging/tests {posargs}

[testenv:ruff]
package = skip
deps = ruff
commands = ruff check {posargs:.}

[testenv:ruff-format]
package = skip
deps = ruff
commands = ruff format --check {posargs:.}

[testenv:ruff-fix]
package = skip
deps = ruff
commands = ruff check --fix {posargs:.}

[testenv:prek]
package = skip
deps = prek
commands = prek run --config pre-commit-config.yaml --all-files {posargs}

[testenv:build]
package = skip
commands =
    uv build instrumentation/opentelemetry-instrumentation-taskflow
    uv build instrumentation/opentelemetry-instrumentation-oslo-log
    uv build instrumentation/opentelemetry-instrumentation-oslo-messaging
