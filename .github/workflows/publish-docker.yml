name: Publish Docker image

# Builds the auto-instrumentation image and pushes it to Docker Hub when a
# GitHub Release is published. The build context is the repository root
# because the image bundles the local instrumentation/* packages.
#
# Required repository secrets:
#   DOCKERHUB_USERNAME - Docker Hub account / org name
#   DOCKERHUB_TOKEN    - Docker Hub access token (Account Settings > Security)
on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

env:
  IMAGE: daipham3213/otel-autoinstrumentation-openstack

jobs:
  docker:
    name: Build and push image
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set version from release tag
        if: github.event_name == 'release'
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          for pair in "oslo-log:oslo_log" "oslo-messaging:oslo_messaging" "taskflow:taskflow"; do
            dir="${pair%%:*}"; mod="${pair##*:}"
            echo "__version__ = \"$VERSION\"" \
              > "instrumentation/opentelemetry-instrumentation-$dir/src/opentelemetry/instrumentation/$mod/version.py"
          done
          echo "Set version to $VERSION"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
            type=raw,value=latest,enable=${{ github.event_name == 'release' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: autoinstrumentation/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
